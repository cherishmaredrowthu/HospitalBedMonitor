<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BedMonitor System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #00d4ff 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .brand-logo {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-login {
            background: #0d6efd;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
        }
        .btn-login:hover {
            background: #0b5ed7;
            transform: translateY(-2px);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo">🏥</div>
    <h3 class="text-center fw-bold mb-2">Welcome Back</h3>
    <p class="text-center text-muted small mb-4">Authorized Personnel Access Only</p>

    <!-- Spring Security looks for 'username' and 'password' names -->
    <form action="/login" method="post">
        <div class="mb-3">
            <label class="form-label small fw-bold">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
        </div>
        <div class="mb-4">
            <label class="form-label small fw-bold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-login shadow">Sign In</button>
    </form>

    <div class="mt-4 text-center">
        <a href="index.html" class="text-decoration-none small text-muted">← Back to Live Map</a>
    </div>
</div>

<!-- Optional: Show error message if login fails -->
<script>
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('error')) {
        document.body.insertAdjacentHTML('afterbegin', `
            <div class="alert alert-danger position-absolute top-0 start-50 translate-middle-x mt-3" style="z-index: 9999">
                Invalid Username or Password.
            </div>
        `);
    }
</script>

</body>
</html>
